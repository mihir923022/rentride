<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentRide</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: #007bff;
            color: white;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .container {
            padding: 20px;
        }

        .vehicle {
            background: white;
            padding: 15px;
            margin: 10px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<header>
    <h1>🚗 RentRide</h1>
    <p>Vehicle Rental System</p>
</header>

<div class="container">
    <h2>Available Vehicles</h2>
    <div id="vehicleList"></div>
</div>

<script>
    // Fetch vehicles from backend
    fetch('/vehicles')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('vehicleList');

            if (data.length === 0) {
                container.innerHTML = "<p>No vehicles available</p>";
                return;
            }

            data.forEach(vehicle => {
                const div = document.createElement('div');
                div.className = 'vehicle';

                div.innerHTML = `
                    <h3>${vehicle.name}</h3>
                    <p>Type: ${vehicle.type}</p>
                    <p>Price: ₹${vehicle.price}</p>
                    <button>Book Now</button>
                `;

                container.appendChild(div);
            });
        })
        .catch(err => {
            console.error(err);
            document.getElementById('vehicleList').innerHTML = "Error loading vehicles";
        });
</script>

</body>
</html>
